<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Szőlőbirtok">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1A2F1A">
  <title>Szőlőbirtok Munkanyilvántartás</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;padding:0;background:#F7F4EE;font-family:system-ui,-apple-system,sans-serif}
    input,select,textarea,button{font-family:inherit}
    #root{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    .tabbar::-webkit-scrollbar{display:none}
    .tabbar{-ms-overflow-style:none;scrollbar-width:none}
    #sync-badge{position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);right:10px;background:#2D5A1B;color:#fff;font-size:11px;padding:4px 10px;border-radius:20px;opacity:0;transition:opacity 0.4s;z-index:9999;pointer-events:none}
    #offline-badge{position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);right:10px;background:#8B4513;color:#fff;font-size:11px;padding:4px 10px;border-radius:20px;opacity:0;transition:opacity 0.4s;z-index:9999;pointer-events:none}
  </style>
</head>
<body>
<div id="root"></div>

<!-- ROLE GATE v3 -->
<style>
#rg3{position:fixed;inset:0;background:#1A2F1A;z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,-apple-system,sans-serif}
#rg3.off{display:none}
.rg3box{background:#fff;border-radius:20px;padding:30px 22px;max-width:360px;width:100%}
.rg3h{font-family:Georgia,serif;font-size:20px;font-weight:700;color:#2D5A1B;text-align:center;margin:0 0 4px}
.rg3s{font-size:13px;color:#888;text-align:center;margin:0 0 20px}
.rg3opt{display:flex;align-items:center;gap:14px;padding:15px 14px;border-radius:14px;border:1px solid #ddd;margin-bottom:10px;cursor:pointer;background:#fff;width:100%;text-align:left;box-sizing:border-box}
.rg3opt:active{background:#f5f5f5}
.rg3ic{font-size:26px;flex-shrink:0}
.rg3ot{font-weight:700;font-size:14px;color:#1c1c1c;display:block}
.rg3od{font-size:12px;color:#999;display:block;margin-top:2px}
#rg3pw{display:none}
#rg3pw.on{display:block}
#rg3opts.off{display:none}
.rg3inp{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:10px;font-size:16px;margin-bottom:10px;box-sizing:border-box}
.rg3btn{width:100%;padding:13px;background:#2D5A1B;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:8px}
.rg3back{width:100%;padding:10px;background:none;border:none;color:#888;font-size:13px;cursor:pointer}
#rg3err{color:#8B2500;font-size:12px;text-align:center;margin-bottom:8px;display:none}
#rg3err.on{display:block}
#rg3badge{position:fixed;bottom:0;left:0;right:0;background:#2D5A1B;color:#fff;font-size:12px;font-weight:600;text-align:center;padding:9px 16px;z-index:9998;display:none;box-shadow:0 -2px 8px rgba(0,0,0,.15)}
</style>
<div id="rg3">
  <div class="rg3box">
    <div id="rg3opts">
      <p class="rg3h">Belépés módja</p>
      <p class="rg3s">Hogyan szeretnéd használni az appot?</p>
      <button class="rg3opt" onclick="rg3Select('worker')">
        <span class="rg3ic">👷</span>
        <span><span class="rg3ot">Munkás</span><span class="rg3od">Munkák rögzítése, árak nélkül</span></span>
      </button>
      <button class="rg3opt" onclick="rg3ShowPw()">
        <span class="rg3ic">🔑</span>
        <span><span class="rg3ot">Tulajdonos</span><span class="rg3od">Teljes hozzáférés, árakkal és kimutatásokkal</span></span>
      </button>
    </div>
    <div id="rg3pw">
      <p class="rg3h" style="margin-bottom:14px">Jelszó</p>
      <div id="rg3err">Hibás jelszó</div>
      <input type="password" id="rg3inp" class="rg3inp" placeholder="Jelszó"
             onkeydown="if(event.key==='Enter')rg3Check()">
      <button class="rg3btn" onclick="rg3Check()">Megerősítés</button>
      <button class="rg3back" onclick="rg3Back()">Vissza</button>
    </div>
  </div>
</div>
<div id="rg3badge">👷 Munkás nézet — árak elrejtve &nbsp;·&nbsp; <span onclick="rg3Logout()" style="text-decoration:underline;cursor:pointer">Kijelentkezés</span></div>

<script>
const RG3PW='hu2026weingut', RG3KEY='hu_role_v3';
window.__workerMode = false;

function rg3Select(r){
  localStorage.setItem(RG3KEY, r);
  document.getElementById('rg3').classList.add('off');
  if(r==='worker'){
    window.__workerMode=true;
    document.getElementById('rg3badge').style.display='block';
    document.getElementById('root').style.paddingBottom='44px';
  }
}
function rg3ShowPw(){
  document.getElementById('rg3opts').classList.add('off');
  document.getElementById('rg3pw').classList.add('on');
  setTimeout(()=>document.getElementById('rg3inp').focus(),80);
}
function rg3Back(){
  document.getElementById('rg3opts').classList.remove('off');
  document.getElementById('rg3pw').classList.remove('on');
  document.getElementById('rg3err').classList.remove('on');
}
function rg3Check(){
  if(document.getElementById('rg3inp').value===RG3PW){rg3Select('owner');}
  else{document.getElementById('rg3err').classList.add('on');document.getElementById('rg3inp').value='';}
}
function rg3Logout(){localStorage.removeItem(RG3KEY);location.reload();}
// Restore saved role
(function(){
  const r=localStorage.getItem(RG3KEY);
  if(r==='worker'||r==='owner'){
    document.getElementById('rg3').classList.add('off');
    if(r==='worker'){
      window.__workerMode=true;
      document.getElementById('rg3badge').style.display='block';
      document.getElementById('root').style.paddingBottom='44px';
    }
  }
})();
</script>
